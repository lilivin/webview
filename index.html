<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rezerwacja</title>
  </head>
  <body style="font-family: sans-serif; text-align: center; padding: 2rem">
    <h2>Wybierz godzinę rezerwacji</h2>

    <select id="hourSelect">
      <option value="">-- wybierz godzinę --</option>
      <option>09:00</option>
      <option>09:30</option>
      <option>10:00</option>
      <option>10:30</option>
      <option>11:00</option>
      <option>11:30</option>
      <option>12:00</option>
      <option>12:30</option>
      <option>13:00</option>
      <option>13:30</option>
      <option>14:00</option>
      <option>14:30</option>
      <option>15:00</option>
    </select>

    <br /><br />
    <button onclick="submitTime()">Zatwierdź</button>

    <script>
      function submitTime() {
        const hour = document.getElementById("hourSelect").value;

        if (!hour) {
          alert("Wybierz godzinę!");
          return;
        }

        const url = `https://hook.eu1.make.com/wfz62qrtbkavrjinhcz5ta9zb9pefqh6?hour=${encodeURIComponent(
          hour
        )}`;

        fetch(url)
          .then(() => {
            setTimeout(() => window.close(), 300); // zamknięcie po user interaction
          })
          .catch(() => {
            alert("Nie udało się wysłać rezerwacji.");
          });
      }
    </script>
  </body>
</html>
