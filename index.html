<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rezerwacja</title>
  </head>
  <body style="font-family: sans-serif; text-align: center; padding: 2rem">
    <h2>Wybierz godzinę rezerwacji</h2>

    <select id="hourSelect">
      <option value="">-- wybierz godzinę --</option>
      <option>09:00</option>
      <option>09:30</option>
      <option>10:00</option>
      <option>10:30</option>
      <option>11:00</option>
      <!-- Dodaj inne godziny -->
    </select>

    <br /><br />
    <button onclick="submitTime()">Zatwierdź</button>

    <script>
      function getQueryParam(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
      }

      function submitTime() {
        const hour = document.getElementById("hourSelect").value;

        if (!hour) {
          alert("Wybierz godzinę!");
          return;
        }

        // Wysyłka do webhooka Make.com
        const url = `https://hook.eu1.make.com/wfz62qrtbkavrjinhcz5ta9zb9pefqh6?hour=${encodeURIComponent(
          hour
        )}`;

        // Przekierowanie (Make odbierze request GET)
        window.location.href = url;

        // Ewentualne zamknięcie okna po czasie
        setTimeout(() => window.close(), 1000);
      }
    </script>
  </body>
</html>
